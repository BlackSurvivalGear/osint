<!DOCTYPE html>
<html lang="en">

<head>

<body>

<header class="mainHeader">

<button data-tab="home" class="active">Home</button>
<button data-tab="live">LIVE NEWS</button>

<button onclick="showLive(event,'wion')">Sky News</button>
<button onclick="showLive(event,'sky')">WION</button>
<button onclick="showLive(event,'quad')">Quad View</button>
<button onclick="fullscreenPlayer()">Full Screen</button>
</div>

<div id="marineMenu" class="subMenu">
<button onclick="showMarineTraffic(event)" class="active">Marine Traffic</button>
<button onclick="showMarinePoint(event,'hormuz')">Hormuz</button>
<button onclick="showMarinePoint(event,'malacca')">Malacca</button>
<button onclick="showMarinePoint(event,'bab')">Bab el-Mandeb</button>
<button onclick="showMarinePoint(event,'suez')">Suez</button>
<button onclick="showMarinePoint(event,'panama')">Panama</button>
<button onclick="showMarinePoint(event,'bosporus')">Bosporus</button>
<button onclick="showMarinePoint(event,'gibraltar')">Gibraltar</button>
<button onclick="showMarinePoint(event,'dover')">Dover</button>
</div>

<div id="sitrepMenu" class="subMenu">
<button onclick="showSitrep(event,'global')" class="active">Global</button>
<button onclick="showSitrep(event,'africa')">Africa</button>
<button onclick="showSitrep(event,'europe')">Europe</button>
<button onclick="showSitrep(event,'middleeast')">Middle East</button>
<button onclick="showSitrep(event,'asia')">Asia</button>
<button onclick="showSitrep(event,'americas')">Americas</button>
</div>

</div>

<main>

<section id="home" class="tab active">
<div class="homeHero">

<div class="heroOverlay">

</div>
</div>
</section>

<section id="live" class="tab">
<div id="liveSingle" class="livePlayer">
<iframe id="liveFrame" src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3" allowfullscreen></iframe>
</div>
<div id="liveQuad" class="quadGrid">
<iframe src="https://rumble.com/embed/v33aw1a/?pub=4jw3x3"></iframe>
<iframe src="https://www.youtube.com/embed/gCNeDWCI0vo"></iframe>
<iframe src="https://www.youtube.com/embed/YDvsBbKfLPA"></iframe>
<iframe src="https://www.youtube.com/embed/vfszY1JYbMc"></iframe>
</div>
</section>

<section id="markets" class="tab">
<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>
<script src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
{"colorTheme":"dark","locale":"en","backgroundColor":"#020606","width":"100%","height":550}
</script>
</div>
</section>

<section id="conflict" class="tab">
<iframe src="https://iran.liveuamap.com"></iframe>
</section>

<section id="aircraft" class="tab">

</section>

<section id="marine" class="tab">
<iframe id="marineFrame" src="https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4" allowfullscreen></iframe>
</section>

<iframe src="https://threatmap.checkpoint.com"></iframe>
</section>

<section id="radio" class="tab">
<iframe src="https://radio.garden/"></iframe>
</section>

<section id="sitrep" class="tab">
<div class="sitrepContainer">
<div id="sitrepContent"></div>
</div>
</section>

</main>

<footer class="mainFooter">
<div class="footerTop">
<a href="https://BlackSurvivalGear.com" target="_blank">
<video autoplay muted loop playsinline>
<source src="RADAR3.mp4">
</video>
</a>
</div>
<div class="footerCenter">
<a href="https://BlackSurvivalGear.com" target="_blank">BlackSurvivalGear.com</a>
</div>
<div class="footerRight">
BSG Strategic Awareness OSINT — VBASE
</div>
</footer>

<script>

/* FLAGS */
let sitrepUnlocked = false;
let currentSitrepRegion = "global";

/* SPLASH */
window.addEventListener("load",function(){
setTimeout(()=>{introRadar.style.opacity="0";setTimeout(()=>introRadar.style.display="none",600)},1500)
})

/* CLOCK */
setInterval(()=>{
const n=new Date()
dateTime.textContent=n.toLocaleString()
},1000)

/* NAV */
document.querySelectorAll("nav button").forEach(btn=>{
btn.onclick=()=>{

if(btn.dataset.tab==="sitrep" && !sitrepUnlocked){
let pass=prompt("ENTER ACCESS CODE")
if(pass!=="africa2026"){alert("ACCESS DENIED");return;}
sitrepUnlocked=true;
}

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")
document.getElementById(btn.dataset.tab).classList.add("active")

subMenuBar.style.display="none"
liveMenu.style.display="none"
marineMenu.style.display="none"
sitrepMenu.style.display="none"

if(btn.dataset.tab==="live"){
subMenuBar.style.display="block"
liveMenu.style.display="flex"
}

if(btn.dataset.tab==="marine"){
subMenuBar.style.display="block"
marineMenu.style.display="flex"
showMarineTraffic()
}

if(btn.dataset.tab==="sitrep"){
subMenuBar.style.display="block"
sitrepMenu.style.display="flex"
updateSitrep()
}

}
})

/* LIVE */
function showLive(e,c){
liveFrame.src={
rt:"https://rumble.com/embed/v33aw1a/?pub=4jw3x3",
aj:"https://www.youtube.com/embed/gCNeDWCI0vo",
wion:"https://www.youtube.com/embed/YDvsBbKfLPA",
sky:"https://www.youtube.com/embed/vfszY1JYbMc"
}[c]||liveFrame.src
}

/* SITREP ENGINE */
async function generateSitrep(){

function r(a){return a[Math.floor(Math.random()*a.length)]}

return{
time:new Date().toLocaleTimeString(),
political:r(["Gov instability","Diplomatic tension","Policy shifts","Foreign influence"]),
conflict:r(["Troop movement","Border tension","Low conflict","Alert posture"]),
economic:r(["Market volatility","Commodity shift","Supply risk","Currency pressure"]),
civil:r(["Protests","Population movement","Unrest signals","Info ops"])
}
}

function renderSitrep(d){
sitrepContent.innerHTML=`
<h2>SITREP // ${currentSitrepRegion.toUpperCase()}</h2>
<p>Updated: ${d.time}</p>
<div class="sitrepGrid">
<div class="sitrepCard"><h3>Political</h3><p>${d.political}</p></div>
<div class="sitrepCard"><h3>Security</h3><p>${d.conflict}</p></div>
<div class="sitrepCard"><h3>Economic</h3><p>${d.economic}</p></div>
<div class="sitrepCard"><h3>Civil</h3><p>${d.civil}</p></div>
</div>`
}

async function updateSitrep(){
const d=await generateSitrep()
renderSitrep(d)
}

setInterval(updateSitrep,60000)

function showSitrep(e,r){
currentSitrepRegion=r
updateSitrep()
}

/* MARINE */
function showMarineTraffic(){marineFrame.src="https://www.marinetraffic.com/en/ais/embed/zoom:2/maptype:4"}

</script>

</body>
</html>
